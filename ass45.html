<!DOCTYPE html>
<html>
<head>
    <title>Simple Gallery</title>
    <style>
        body {
            position: relative;
            height: 400px;
        }

        img {
            position: absolute;
            width: 200px;
            height: 200px;
        }

        .img1 { top: 50px; left: 50px; z-index: 1; }
        .img2 { top: 100px; left: 120px; z-index: 2; }
        .img3 { top: 150px; left: 190px; z-index: 3; }
    </style>
</head>
<body>
    <h1> Heading </h1>
    <img src="https://media.istockphoto.com/id/1381637603/photo/mountain-landscape.jpg?s=612x612&w=0&k=20&c=w64j3fW8C96CfYo3kbi386rs_sHH_6BGe8lAAAFS-y4=" class="img1">
    <img src="https://i0.wp.com/picjumbo.com/wp-content/uploads/beautiful-fall-nature-scenery-free-image.jpeg?w=2210&quality=70" class="img2">
    <img src="https://png.pngtree.com/thumb_back/fh260/background/20240913/pngtree-beautiful-nature-scenery-wallpaper-view-image_16172461.jpg" class="img3">

    <script>
        let images = document.querySelectorAll("img");

        images.forEach(function(img) {
            img.addEventListener("click", function() {

                images[0].style.zIndex = 1;
                images[1].style.zIndex = 2;
                images[2].style.zIndex = 3;

                img.style.zIndex = 10;

            });
        });
    </script>

</body>
</html>
