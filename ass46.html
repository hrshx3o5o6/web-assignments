<html>
<head>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<button id="btn">Show / Hide</button>

<p id="text">This is a simple paragraph.</p>

<script>
$(document).ready(function(){
    $("#btn").click(function(){
        $("#text").toggle();
    });
});
</script>

</body>
</html>
