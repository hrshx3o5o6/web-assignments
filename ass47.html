<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 47</title>
</head>
<body>
    <div style="margin:40px auto;text-align:center; display: flex; flex-direction: row; justify-content: space-around; align-items: center; ">
        <img class="thumb" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=400&q=80" width="100" height="70" alt="Thumb 1" style="margin:8px;display:none;">
        <img class="thumb" src="https://images.unsplash.com/photo-1465101046530-73398c7f28ca?auto=format&fit=crop&w=400&q=80" width="100" height="70" alt="Thumb 2" style="margin:8px;display:none;">
        <img class="thumb" src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308?auto=format&fit=crop&w=400&q=80" width="100" height="70" alt="Thumb 3" style="margin:8px;display:none;">
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(function() {
            setTimeout(function() {
                $('.thumb').each(function(idx) {
                    $(this).fadeIn(200);
                });
            }, 2000);
            $('.thumb').click(function() {
                $(this).fadeOut(300);
            });
        });
    </script>
</body>
</html>
